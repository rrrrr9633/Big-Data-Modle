services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pdm-frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pdm-backend
    environment:
      MYSQL_URL: mysql+pymysql://root:123123@mysql:3306/pdm
      REDIS_URL: redis://redis:6379/0
      TSDB_URL: postgresql://pdm:123123@timescaledb:5432/pdm_tsdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MQTT_BROKER_HOST: emqx
      MQTT_TO_KAFKA_ENABLED: "true"
      RAW_TELEMETRY_CONSUMER_ENABLED: "true"
      CLEANED_TELEMETRY_CONSUMER_ENABLED: "true"
      FEATURE_CONSUMER_ENABLED: "true"
      INFERENCE_CONSUMER_ENABLED: "true"
      SIMULATION_AUTO_START: "true"
      SIMULATION_CONTROL_API_ENABLED: "false"
      SIMULATION_MODEL_BOOTSTRAP_ENABLED: "true"
      SIMULATION_MODEL_DATASET_PATH: /app/ai4i2020.csv
      SIMULATION_DEVICE_COUNT: "6"
      SIMULATION_MODE: degrading
      SIMULATION_INTERVAL_SECONDS: "1.0"
      SIMULATION_START_DELAY_SECONDS: "3.0"
      CORS_ORIGINS: '["http://localhost","http://127.0.0.1"]'
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      emqx:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/backend/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: pdm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123123
      MYSQL_DATABASE: pdm
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123123"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8
    container_name: pdm-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pdm-timescaledb
    environment:
      POSTGRES_DB: pdm_tsdb
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: 123123
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./infra/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm -d pdm_tsdb"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.0.0
    container_name: pdm-kafka
    ports:
      - "127.0.0.1:9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  emqx:
    image: emqx/emqx:latest
    container_name: pdm-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  timescale_data:
  model_artifacts:
