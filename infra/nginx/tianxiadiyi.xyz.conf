server {
    listen 80;
    listen [::]:80;
    server_name tianxiadiyi.xyz www.tianxiadiyi.xyz;

    return 301 https://tianxiadiyi.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tianxiadiyi.xyz www.tianxiadiyi.xyz;

    ssl_certificate /etc/letsencrypt/live/tianxiadiyi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tianxiadiyi.xyz/privkey.pem;

    root /var/www/tianxiadiyi.xyz;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}